<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TalentLink • Auth</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../css/auth.css" />
  </head>
  <body>
    <div class="bg"></div>

    <div class="auth-card">
      <!-- Header -->
      <div class="header">
        <div class="logo-box">✕</div>
        <span>TalentLink</span>
      </div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" id="loginTab">Log In</button>
        <button class="tab" id="signupTab">Sign Up</button>
        <span class="underline"></span>
      </div>

      <!-- Content -->
      <h1 id="title">Welcome Back</h1>
      <p class="subtitle" id="subtitle">Log in to find or build your team</p>

      <form class="form">
        <div class="field">
          <i class="fa-regular fa-envelope"></i>
          <input type="email" placeholder="Email address" required />
        </div>

        <div class="field">
          <i class="fa-solid fa-lock"></i>
          <input type="password" placeholder="Password" required />
        </div>

        <button class="primary">Continue</button>
      </form>

      <div class="or">or</div>

      <button class="google">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" />
        Continue with Google
      </button>

      <p class="switch">
        <span id="switchText">Don’t have an account?</span>
        <button id="switchBtn">Sign up</button>
      </p>
    </div>

    <script src="../js/auth.js"></script>
  </body>
</html>
